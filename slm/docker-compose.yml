services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    image: docker-ollama
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      # - ../models:/models
    restart: unless-stopped
    # No custom entrypoint/command needed - model is baked into the image
    # Dockerfile CMD ["serve"] will start Ollama automatically
    

  badge-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-badge-api
    container_name: badge-api
    ports:
      - "8000:8000"
    volumes:
      - ./assets:/app/assets
      - ./logs:/app/logs
    environment:
      - OLLAMA_API_URL=http://ollama:11434/api/generate
      - BADGE_IMAGE_SERVICE_URL=http://host.docker.internal:3001  # For external image service on host
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Enable access to host machine services
    restart: unless-stopped

volumes:
  ollama-data:
