# Full badge-generation stack: frontend -> slm -> image-gen, with Ollama serving
# the phi-4-mini model baked in at build time from slm/models/*.gguf.
#
# Copy env.example to .env and adjust for your deployment before `docker compose up`.

services:
  # The model weights are the OneOrigin-trained phi-4-mini GGUF hosted on
  # OneNAS (10.0.0.153:/mnt/volume1/models/phi4-gguf). They stay there —
  # bind-mounted read-only and imported into the local ollama blob store on
  # first start. Set MODEL_GGUF_PATH if the NAS mountpoint differs.
  ollama:
    # Official image — the alpine/ollama arm64 build ships without
    # llama-server/llama-quantize and cannot create or run models.
    image: ollama/ollama:latest
    container_name: mit-ollama
    entrypoint: >
      sh -c "ollama serve &
      sleep 5;
      cd /import;
      ollama list | grep -q phi4-chat || ollama create phi4-chat -f Modelfile;
      wait"
    volumes:
      - ollama-data:/root/.ollama
      - ${MODEL_GGUF_PATH:-/mnt/onenas-models/phi4-gguf/Phi-4-mini-instruct_Q4_K_M.gguf}:/import/Phi-4-mini-instruct_Q4_K_M.gguf:ro
      - ./slm/models/Modelfile:/import/Modelfile:ro
    restart: unless-stopped

  slm:
    build: ./slm
    image: mit-badges-slm
    container_name: mit-slm
    ports:
      - "${SLM_PORT:-8000}:8000"
    environment:
      - OLLAMA_API_URL=http://ollama:11434/api/generate
      - BADGE_IMAGE_SERVICE_URL=http://image-gen:3001
      - CORS_ORIGINS_STR=${CORS_ORIGINS_STR:-http://localhost:3000}
      - BADGE_ISSUER_URL=${BADGE_ISSUER_URL:-http://localhost:8000}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./slm/logs:/app/logs
    depends_on:
      - ollama
      - image-gen
    restart: unless-stopped

  image-gen:
    build: ./image-gen
    image: mit-badges-image-gen
    container_name: mit-image-gen
    ports:
      - "${IMAGE_GEN_PORT:-3001}:3001"
    environment:
      - PORT=3001
      - CORS_ORIGINS_STR=${CORS_ORIGINS_STR:-http://localhost:3000}
    volumes:
      - ./image-gen/logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the static export at build time (Next.js output: export).
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    image: mit-badges-frontend
    container_name: mit-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - slm
    restart: unless-stopped

  # Public exposure via Cloudflare tunnel "mit-badges" (oneorigin.org zone,
  # no Access policies). Ingress: badges.oneorigin.org -> frontend:80,
  # api-badges.oneorigin.org -> slm:8000. Set TUNNEL_TOKEN in .env to enable.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mit-cloudflared
    command: tunnel run --token ${TUNNEL_TOKEN:-}
    depends_on:
      - frontend
      - slm
    restart: unless-stopped
    profiles:
      - public

volumes:
  ollama-data:
