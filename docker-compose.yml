# Full badge-generation stack: frontend -> slm -> image-gen, with Ollama serving
# the phi-4-mini model baked in at build time from slm/models/*.gguf.
#
# Copy env.example to .env and adjust for your deployment before `docker compose up`.

services:
  ollama:
    build:
      context: ./slm
      dockerfile: Dockerfile.ollama
    image: mit-badges-ollama
    container_name: mit-ollama
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  slm:
    build: ./slm
    image: mit-badges-slm
    container_name: mit-slm
    ports:
      - "${SLM_PORT:-8000}:8000"
    environment:
      - OLLAMA_API_URL=http://ollama:11434/api/generate
      - BADGE_IMAGE_SERVICE_URL=http://image-gen:3001
      - CORS_ORIGINS_STR=${CORS_ORIGINS_STR:-http://localhost:3000}
      - BADGE_ISSUER_URL=${BADGE_ISSUER_URL:-http://localhost:8000}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./slm/logs:/app/logs
    depends_on:
      - ollama
      - image-gen
    restart: unless-stopped

  image-gen:
    build: ./image-gen
    image: mit-badges-image-gen
    container_name: mit-image-gen
    ports:
      - "${IMAGE_GEN_PORT:-3001}:3001"
    environment:
      - PORT=3001
      - CORS_ORIGINS_STR=${CORS_ORIGINS_STR:-http://localhost:3000}
    volumes:
      - ./image-gen/logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the static export at build time (Next.js output: export).
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    image: mit-badges-frontend
    container_name: mit-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - slm
    restart: unless-stopped

volumes:
  ollama-data:
